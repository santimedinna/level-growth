<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo -->
  <rect width="32" height="32" rx="6" fill="#0f1117"/>
  <!-- Línea ascendente (área bajo la curva) -->
  <path
    d="M 4,24 L 10,18 L 16,20 L 22,10 L 28,6 L 28,26 L 4,26 Z"
    fill="#3FC87A"
    fill-opacity="0.15"
  />
  <!-- Línea principal -->
  <polyline
    points="4,24 10,18 16,20 22,10 28,6"
    fill="none"
    stroke="#3FC87A"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Punto final (pico) -->
  <circle cx="28" cy="6" r="2.5" fill="#3FC87A"/>
</svg>
